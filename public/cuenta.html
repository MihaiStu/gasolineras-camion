<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tu cuenta · Repostaje Camión</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0f172a; --navy2: #1e293b; --panel: #162032;
    --accent: #f97316; --accent2: #fb923c; --green: #22c55e; --red: #ef4444;
    --text: #e2e8f0; --muted: #94a3b8; --border: #1e3a5f;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Barlow', sans-serif;
    background: radial-gradient(1200px 600px at 50% -10%, #14213d 0%, var(--navy) 55%);
    color: var(--text); min-height: 100vh; padding: 24px 16px 48px;
    display: flex; flex-direction: column; align-items: center;
  }
  .wrap { width: 100%; max-width: 820px; }
  .topbar { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 22px; flex-wrap: wrap; }
  .brand { font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 800; letter-spacing: 1.5px; color: var(--accent); }
  .brand span { color: var(--text); }
  .account { color: var(--muted); font-size: 14px; }
  .account b { color: var(--text); }

  /* AUTH card */
  .auth { max-width: 420px; margin: 30px auto 0; background: var(--panel); border: 1px solid var(--border); border-radius: 14px; padding: 26px; box-shadow: 0 20px 50px -20px rgba(0,0,0,.6); }
  .auth h1 { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 28px; text-align: center; margin-bottom: 4px; }
  .auth .lead { text-align: center; color: var(--muted); font-size: 14px; margin-bottom: 20px; }
  .tabs { display: flex; gap: 6px; background: var(--navy); border: 1px solid var(--border); border-radius: 10px; padding: 4px; margin-bottom: 18px; }
  .tabs button { flex: 1; background: none; border: none; color: var(--muted); font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 15px; letter-spacing: .5px; padding: 9px; border-radius: 7px; cursor: pointer; }
  .tabs button.active { background: var(--accent); color: #1a1006; }
  .field { margin-bottom: 13px; }
  .field label { display: block; font-size: 12px; font-weight: 600; letter-spacing: .4px; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
  input, select { width: 100%; background: var(--navy); color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 11px 12px; font-family: 'Barlow', sans-serif; font-size: 15px; }
  input:focus, select:focus { outline: none; border-color: var(--accent); }
  .btn { width: 100%; margin-top: 8px; background: var(--accent); color: #1a1006; border: none; border-radius: 9px; padding: 13px; font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 18px; letter-spacing: .5px; cursor: pointer; transition: background .12s; }
  .btn:hover { background: var(--accent2); }
  .btn:disabled { opacity: .6; cursor: default; }
  .btn-ghost { background: none; border: 1px solid var(--border); color: var(--muted); font-size: 13px; padding: 7px 12px; border-radius: 8px; cursor: pointer; }
  .msg { margin-top: 12px; font-size: 13px; text-align: center; min-height: 18px; }
  .msg.err { color: var(--red); }
  .msg.ok { color: var(--green); }

  /* REPORTING (igual que cuenta-demo) */
  .hero { background: linear-gradient(180deg, rgba(34,197,94,.10), rgba(34,197,94,.03)); border: 1px solid rgba(34,197,94,.35); border-radius: 16px; padding: 30px 24px; text-align: center; margin-bottom: 18px; }
  .hero .label { font-size: 14px; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; }
  .hero .big { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: clamp(56px, 16vw, 104px); line-height: 1; color: var(--green); margin: 6px 0; font-variant-numeric: tabular-nums; }
  .hero .mes { color: var(--text); font-size: 16px; }
  .hero .mes b { color: var(--accent); text-transform: capitalize; }
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 22px; }
  .stat { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 16px; text-align: center; }
  .stat .k { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; }
  .stat .v { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 30px; margin-top: 2px; font-variant-numeric: tabular-nums; }
  .section-title { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 18px; letter-spacing: .5px; margin: 8px 2px 12px; text-transform: uppercase; }
  .table-card { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  thead th { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; text-align: right; padding: 12px 14px; border-bottom: 1px solid var(--border); font-weight: 600; }
  thead th:first-child { text-align: left; }
  tbody td { padding: 13px 14px; text-align: right; font-family: 'JetBrains Mono', monospace; font-size: 14px; border-bottom: 1px solid rgba(30,58,95,.5); }
  tbody td:first-child { text-align: left; font-family: 'Barlow', sans-serif; font-weight: 600; }
  tbody tr:last-child td { border-bottom: none; }
  td.save { color: var(--green); font-weight: 700; }
  .delta { color: var(--muted); font-size: 12px; }
  .empty { text-align: center; color: var(--muted); padding: 40px 20px; line-height: 1.6; }
  .foot { text-align: center; color: var(--muted); font-size: 12px; margin-top: 22px; line-height: 1.6; }
  .foot a { color: var(--accent); text-decoration: none; }
  .hidden { display: none; }
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="brand">REPOSTAJE <span>CAMIÓN</span></div>
    <div id="session-info" class="hidden" style="display:flex;align-items:center;gap:10px;">
      <span class="account">Cuenta: <b id="acc-name">…</b></span>
      <button class="btn-ghost" id="logout">Salir</button>
    </div>
  </div>

  <!-- AUTH -->
  <div id="auth" class="auth">
    <h1>Tu cuenta</h1>
    <p class="lead">Entra para ver cuánto ahorra tu flota.</p>
    <div class="tabs">
      <button id="tab-login" class="active" type="button">Entrar</button>
      <button id="tab-signup" type="button">Crear cuenta</button>
    </div>

    <form id="form-login">
      <div class="field"><label>Email</label><input type="email" id="l-email" autocomplete="email" required></div>
      <div class="field"><label>Contraseña</label><input type="password" id="l-pass" autocomplete="current-password" required></div>
      <button class="btn" type="submit">Entrar</button>
    </form>

    <form id="form-signup" class="hidden">
      <div class="field"><label>Empresa / autónomo</label><input type="text" id="s-company" placeholder="Transportes García SL" required></div>
      <div class="field"><label>Tu nombre</label><input type="text" id="s-name" placeholder="Nombre y apellidos"></div>
      <div class="field"><label>Tipo de cuenta</label>
        <select id="s-tipo"><option value="autonomo">Autónomo (1 camión)</option><option value="flota">Flota (varios camiones)</option></select>
      </div>
      <div class="field"><label>Email</label><input type="email" id="s-email" autocomplete="email" required></div>
      <div class="field"><label>Contraseña</label><input type="password" id="s-pass" autocomplete="new-password" minlength="6" required></div>
      <button class="btn" type="submit">Crear cuenta gratis</button>
    </form>

    <div class="msg" id="auth-msg"></div>
  </div>

  <!-- REPORTING -->
  <div id="report" class="hidden">
    <div id="report-body"><div class="empty">Cargando…</div></div>
  </div>

  <p class="foot">
    <a href="/calculadora.html">Calculadora →</a> · <a href="/gasolineras.html">Mapa →</a>
  </p>
</div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

  const SUPABASE_URL = 'http://192.168.1.33:8100';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiIsImlzcyI6InN1cGFiYXNlIiwiaWF0IjoxNzgyMjM3OTM0LCJleHAiOjIwOTc1OTc5MzR9.HIN7LriE0ngaW9_4jILe9MxtATqavJHAiCLR_GmV19s';
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
    db: { schema: 'gasoil' },
    auth: { persistSession: true, autoRefreshToken: true },
  });

  const $ = id => document.getElementById(id);
  const num = n => { const s = Math.round(Math.abs(n)).toString(); let o=''; for (let i=0;i<s.length;i++){ if(i>0&&(s.length-i)%3===0)o+='.'; o+=s[i]; } return (n<0?'-':'')+o; };
  const eur = n => num(n) + ' €';
  const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  const MESES = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  const msg = (t, cls='') => { $('auth-msg').textContent = t; $('auth-msg').className = 'msg ' + cls; };

  // Tabs
  $('tab-login').onclick = () => { $('tab-login').classList.add('active'); $('tab-signup').classList.remove('active'); $('form-login').classList.remove('hidden'); $('form-signup').classList.add('hidden'); msg(''); };
  $('tab-signup').onclick = () => { $('tab-signup').classList.add('active'); $('tab-login').classList.remove('active'); $('form-signup').classList.remove('hidden'); $('form-login').classList.add('hidden'); msg(''); };

  // Login
  $('form-login').addEventListener('submit', async (e) => {
    e.preventDefault(); msg('Entrando…');
    const { error } = await sb.auth.signInWithPassword({ email: $('l-email').value, password: $('l-pass').value });
    if (error) return msg(error.message, 'err');
    msg('');
  });

  // Signup
  $('form-signup').addEventListener('submit', async (e) => {
    e.preventDefault(); msg('Creando cuenta…');
    const { data, error } = await sb.auth.signUp({
      email: $('s-email').value, password: $('s-pass').value,
      options: { data: { company_name: $('s-company').value, nombre: $('s-name').value, tipo: $('s-tipo').value } },
    });
    if (error) return msg(error.message, 'err');
    if (!data.session) return msg('Cuenta creada. Revisa tu email para confirmarla.', 'ok');
    msg('');
  });

  $('logout').onclick = async () => { await sb.auth.signOut(); };

  // Reacciona a cambios de sesión (login, logout, refresh)
  sb.auth.onAuthStateChange((_event, session) => { render(session); });

  async function render(session) {
    if (!session) {
      $('auth').classList.remove('hidden');
      $('report').classList.add('hidden');
      $('session-info').classList.add('hidden');
      return;
    }
    $('auth').classList.add('hidden');
    $('report').classList.remove('hidden');
    $('session-info').classList.remove('hidden');

    // Nombre de la cuenta (tenant)
    const { data: tenants } = await sb.from('tenant').select('nombre').limit(1);
    $('acc-name').textContent = tenants?.[0]?.nombre || session.user.email;

    await loadReport();
  }

  async function loadReport() {
    const body = $('report-body');
    body.innerHTML = '<div class="empty">Cargando el ahorro del mes…</div>';
    try {
      const monthStart = new Date(); monthStart.setDate(1);
      const mesISO = monthStart.toISOString().slice(0, 10);

      const [{ data: roll }, { data: perTruck }, { data: trucks }] = await Promise.all([
        sb.from('savings_current_month').select('*'),
        sb.from('monthly_savings').select('*').eq('mes', mesISO),
        sb.from('truck').select('id,matricula'),
      ]);

      const r = roll?.[0];
      if (!r || Number(r.repostajes) === 0) {
        body.innerHTML = `<div class="empty"><strong>Aún no hay repostajes este mes.</strong><br>
          Cuando registres repostajes, aquí verás cuánto has ahorrado.</div>`;
        return;
      }

      const mesNombre = MESES[new Date().getMonth()];
      const tmap = {}; (trucks || []).forEach(t => tmap[t.id] = t.matricula);
      const rows = (perTruck || []).slice().sort((a,b) => Number(b.ahorro_eur) - Number(a.ahorro_eur));
      const filas = rows.map(t => `<tr>
        <td>${esc(tmap[t.truck_id] || '—')}</td>
        <td>${Number(t.repostajes)}</td>
        <td>${num(t.litros)} L</td>
        <td>${Number(t.precio_pagado_medio).toFixed(3).replace('.', ',')}<br><span class="delta">ref ${Number(t.precio_referencia_medio).toFixed(3).replace('.', ',')}</span></td>
        <td class="save">${eur(t.ahorro_eur)}</td>
      </tr>`).join('');

      body.innerHTML = `
        <div class="hero">
          <div class="label">Este mes te has ahorrado</div>
          <div class="big">${eur(r.ahorro_eur)}</div>
          <div class="mes">en <b>${mesNombre}</b>, en ${Number(r.camiones)} ${Number(r.camiones)===1?'camión':'camiones'}</div>
        </div>
        <div class="stats">
          <div class="stat"><div class="k">Camiones</div><div class="v">${Number(r.camiones)}</div></div>
          <div class="stat"><div class="k">Repostajes</div><div class="v">${Number(r.repostajes)}</div></div>
          <div class="stat"><div class="k">Litros</div><div class="v">${num(r.litros)}</div></div>
        </div>
        ${filas ? `<div class="section-title">Ahorro por camión</div>
        <div class="table-card"><table>
          <thead><tr><th>Camión</th><th>Repostajes</th><th>Litros</th><th>€/L pagado</th><th>Ahorro</th></tr></thead>
          <tbody>${filas}</tbody>
        </table></div>` : ''}`;
    } catch (e) {
      body.innerHTML = `<div class="empty">No se pudo cargar el ahorro (${esc(e.message)}).</div>`;
    }
  }

  // Estado inicial
  const { data: { session } } = await sb.auth.getSession();
  render(session);
</script>
</body>
</html>
