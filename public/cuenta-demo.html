<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contador de ahorro (demo) · Repostaje Camión</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0f172a; --navy2: #1e293b; --panel: #162032;
    --accent: #f97316; --accent2: #fb923c; --green: #22c55e;
    --text: #e2e8f0; --muted: #94a3b8; --border: #1e3a5f;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Barlow', sans-serif;
    background: radial-gradient(1200px 600px at 50% -10%, #14213d 0%, var(--navy) 55%);
    color: var(--text); min-height: 100vh; padding: 24px 16px 48px;
    display: flex; flex-direction: column; align-items: center;
  }
  .wrap { width: 100%; max-width: 820px; }

  .topbar { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 22px; flex-wrap: wrap; }
  .brand { font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 800; letter-spacing: 1.5px; color: var(--accent); }
  .brand span { color: var(--text); }
  .badge-demo { background: rgba(249,115,22,.15); border: 1px solid var(--accent); color: var(--accent2); font-size: 11px; font-weight: 700; letter-spacing: .6px; text-transform: uppercase; padding: 4px 9px; border-radius: 999px; }
  .account { color: var(--muted); font-size: 14px; }
  .account b { color: var(--text); }

  /* HERO counter */
  .hero {
    background: linear-gradient(180deg, rgba(34,197,94,.10), rgba(34,197,94,.03));
    border: 1px solid rgba(34,197,94,.35); border-radius: 16px;
    padding: 30px 24px; text-align: center; margin-bottom: 18px;
    box-shadow: 0 20px 50px -20px rgba(0,0,0,.6);
  }
  .hero .label { font-size: 14px; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; }
  .hero .big {
    font-family: 'Barlow Condensed', sans-serif; font-weight: 800;
    font-size: clamp(56px, 16vw, 104px); line-height: 1; color: var(--green);
    margin: 6px 0; font-variant-numeric: tabular-nums;
  }
  .hero .mes { color: var(--text); font-size: 16px; }
  .hero .mes b { color: var(--accent); text-transform: capitalize; }

  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 22px; }
  .stat { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 16px; text-align: center; }
  .stat .k { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; }
  .stat .v { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 30px; margin-top: 2px; font-variant-numeric: tabular-nums; }

  .section-title { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 18px; letter-spacing: .5px; color: var(--text); margin: 8px 2px 12px; text-transform: uppercase; }

  .table-card { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  thead th { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; text-align: right; padding: 12px 14px; border-bottom: 1px solid var(--border); font-weight: 600; }
  thead th:first-child { text-align: left; }
  tbody td { padding: 13px 14px; text-align: right; font-family: 'JetBrains Mono', monospace; font-size: 14px; border-bottom: 1px solid rgba(30,58,95,.5); }
  tbody td:first-child { text-align: left; font-family: 'Barlow', sans-serif; font-weight: 600; }
  tbody tr:last-child td { border-bottom: none; }
  td.save { color: var(--green); font-weight: 700; }
  .delta { color: var(--muted); font-size: 12px; }

  .state { text-align: center; color: var(--muted); padding: 40px 0; font-size: 15px; }
  .state.error { color: var(--accent2); }

  .foot { text-align: center; color: var(--muted); font-size: 12px; margin-top: 22px; line-height: 1.6; }
  .foot a { color: var(--accent); text-decoration: none; }
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="brand">REPOSTAJE <span>CAMIÓN</span></div>
    <div style="display:flex;align-items:center;gap:10px;">
      <span class="account">Cuenta: <b>AdmiLogistic</b></span>
      <span class="badge-demo">Demo</span>
    </div>
  </div>

  <div id="content">
    <div class="state" id="state">Cargando el ahorro del mes…</div>
  </div>

  <p class="foot">
    Datos de muestra de un único camión/flota demo, servidos desde Supabase (vista <code>savings_demo</code>).<br>
    Con cuenta real, este panel mostrará el ahorro de tus propios repostajes. ·
    <a href="/calculadora.html">Calculadora →</a> · <a href="/gasolineras.html">Mapa →</a>
  </p>
</div>

<script>
  const SUPABASE_URL = 'http://192.168.1.33:8100';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiIsImlzcyI6InN1cGFiYXNlIiwiaWF0IjoxNzgyMjM3OTM0LCJleHAiOjIwOTc1OTc5MzR9.HIN7LriE0ngaW9_4jILe9MxtATqavJHAiCLR_GmV19s';
  const SUPABASE_SCHEMA = 'gasoil';

  const num = n => {
    const s = Math.round(Math.abs(n)).toString();
    let out = '';
    for (let i = 0; i < s.length; i++) {
      if (i > 0 && (s.length - i) % 3 === 0) out += '.';
      out += s[i];
    }
    return (n < 0 ? '-' : '') + out;
  };
  const eur = n => num(n) + ' €';
  const MESES = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

  async function load() {
    const stateEl = document.getElementById('state');
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/savings_demo?select=*&order=ahorro_eur.desc`, {
        headers: { apikey: SUPABASE_ANON_KEY, 'Accept-Profile': SUPABASE_SCHEMA },
        signal: AbortSignal.timeout(8000),
      });
      if (!res.ok) throw new Error('REST ' + res.status);
      const rows = await res.json();
      if (!rows.length) { stateEl.textContent = 'Aún no hay repostajes este mes.'; return; }
      render(rows);
    } catch (e) {
      stateEl.className = 'state error';
      stateEl.textContent = 'No se pudo cargar el ahorro (' + e.message + '). ¿Backend accesible?';
    }
  }

  function render(rows) {
    const total      = rows.reduce((a, r) => a + Number(r.ahorro_eur), 0);
    const litros     = rows.reduce((a, r) => a + Number(r.litros), 0);
    const repostajes = rows.reduce((a, r) => a + Number(r.repostajes), 0);
    const camiones   = rows.length;
    const mesNum     = rows[0].mes ? (new Date(rows[0].mes).getUTCMonth()) : (new Date().getMonth());
    const mesNombre  = MESES[mesNum];

    const filas = rows.map(r => {
      const delta = (Number(r.precio_referencia_medio) - Number(r.precio_pagado_medio));
      return `<tr>
        <td>${r.matricula}</td>
        <td>${r.repostajes}</td>
        <td>${num(r.litros)} L</td>
        <td>${Number(r.precio_pagado_medio).toFixed(3).replace('.', ',')}<br><span class="delta">ref ${Number(r.precio_referencia_medio).toFixed(3).replace('.', ',')}</span></td>
        <td class="save">${eur(r.ahorro_eur)}</td>
      </tr>`;
    }).join('');

    document.getElementById('content').innerHTML = `
      <div class="hero">
        <div class="label">Este mes te has ahorrado</div>
        <div class="big">${eur(total)}</div>
        <div class="mes">en <b>${mesNombre}</b>, en ${camiones} ${camiones === 1 ? 'camión' : 'camiones'}</div>
      </div>
      <div class="stats">
        <div class="stat"><div class="k">Camiones</div><div class="v">${camiones}</div></div>
        <div class="stat"><div class="k">Repostajes</div><div class="v">${repostajes}</div></div>
        <div class="stat"><div class="k">Litros</div><div class="v">${num(litros)}</div></div>
      </div>
      <div class="section-title">Ahorro por camión</div>
      <div class="table-card">
        <table>
          <thead><tr>
            <th>Camión</th><th>Repostajes</th><th>Litros</th><th>€/L pagado</th><th>Ahorro</th>
          </tr></thead>
          <tbody>${filas}</tbody>
        </table>
      </div>`;
  }

  load();
</script>
</body>
</html>
