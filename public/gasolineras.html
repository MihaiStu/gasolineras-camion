<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AdmiLogistic · Gasolineras Camión</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=JetBrains+Mono:wght@400;600&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<style>
  :root {
    --navy: #0f172a;
    --navy2: #1e293b;
    --panel: #162032;
    --accent: #f97316;
    --accent2: #fb923c;
    --green: #22c55e;
    --yellow: #eab308;
    --red: #ef4444;
    --text: #e2e8f0;
    --muted: #64748b;
    --border: #1e3a5f;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Barlow', sans-serif;
    background: var(--navy);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* HEADER */
  header {
    background: var(--navy2);
    border-bottom: 2px solid var(--accent);
    padding: 0 14px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    flex-shrink: 0;
    z-index: 1000;
  }
  .logo {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 20px;
    font-weight: 800;
    letter-spacing: 1px;
    color: var(--accent);
    white-space: nowrap;
  }
  .logo span { color: var(--text); }
  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .total-badge {
    background: var(--border);
    border: 1px solid var(--accent);
    border-radius: 4px;
    padding: 4px 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    white-space: nowrap;
  }

  /* ROUTES PANEL */
  .routes-wrapper {
    position: relative;
    flex-shrink: 0;
  }
  .btn-routes {
    background: var(--navy);
    border: 1px solid var(--border);
    color: var(--accent);
    padding: 6px 11px;
    border-radius: 4px;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.5px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .btn-routes:hover, .btn-routes.open { border-color: var(--accent); background: #1a2640; }
  .routes-dropdown {
    display: none;
    position: absolute;
    top: calc(100% + 6px);
    left: 0;
    background: var(--panel);
    border: 1px solid var(--accent);
    border-radius: 6px;
    padding: 10px;
    width: 300px;
    z-index: 3000;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
  }
  .routes-dropdown.open { display: block; }
  .routes-note {
    font-size: 10px;
    color: var(--muted);
    padding: 4px 6px 8px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 8px;
    line-height: 1.4;
  }
  .route-group { margin-bottom: 8px; }
  .route-group:last-child { margin-bottom: 0; }
  .rg-header {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.5px;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
    padding-bottom: 3px;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .route-link {
    display: flex;
    align-items: center;
    justify-content: space-between;
    color: var(--text);
    text-decoration: none;
    font-size: 12px;
    padding: 4px 8px;
    border-radius: 3px;
    margin-bottom: 2px;
    transition: background 0.15s;
    gap: 8px;
    cursor: pointer;
  }
  .route-link:hover { background: var(--navy); color: var(--accent); }
  .route-link-name { flex: 1; min-width: 0; }
  .route-via {
    font-size: 10px;
    color: var(--muted);
    display: block;
    margin-top: 1px;
  }
  .gps-badge {
    font-size: 10px;
    background: #052e16;
    color: var(--green);
    border: 1px solid var(--green);
    border-radius: 3px;
    padding: 2px 5px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .route-link:hover .gps-badge { background: #064e24; }
  .route-banner {
    background: #0a1f38;
    border: 1px solid var(--accent);
    border-radius: 4px;
    padding: 5px 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .route-banner-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 12px;
    color: var(--accent);
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .btn-clear-route {
    background: none;
    border: 1px solid var(--muted);
    color: var(--muted);
    border-radius: 3px;
    padding: 2px 7px;
    font-size: 11px;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .btn-clear-route:hover { border-color: var(--text); color: var(--text); }

  /* LAYOUT */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* SIDEBAR */
  .sidebar {
    width: 320px;
    flex-shrink: 0;
    background: var(--panel);
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    overflow: hidden;
  }
  .sidebar-top {
    padding: 10px;
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 7px;
  }
  .search-box {
    background: var(--navy);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 8px 12px;
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    font-size: 13px;
    width: 100%;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-box:focus { border-color: var(--accent); }
  .search-box::placeholder { color: var(--muted); }
  .filters {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
  }
  .filter-btn {
    background: var(--navy);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 3px 9px;
    border-radius: 3px;
    font-size: 10px;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }
  .filter-btn:hover:not(.active) { border-color: var(--accent); color: var(--accent); }
  .sort-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .sort-label { font-size: 11px; color: var(--muted); white-space: nowrap; }
  .sort-select {
    flex: 1;
    background: var(--navy);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 4px 8px;
    border-radius: 3px;
    font-size: 12px;
    outline: none;
  }

  .station-list {
    flex: 1;
    overflow-y: auto;
    padding: 6px;
  }
  .station-list::-webkit-scrollbar { width: 4px; }
  .station-list::-webkit-scrollbar-track { background: var(--navy); }
  .station-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .station-card {
    background: var(--navy);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 9px 11px;
    margin-bottom: 5px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    gap: 8px;
    align-items: flex-start;
  }
  .station-card:hover { border-color: var(--accent); background: #1a2640; }
  .station-card.selected { border-color: var(--accent); background: #1e2e45; }
  .station-card-body { flex: 1; min-width: 0; }
  .station-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    font-weight: 700;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text);
  }
  .station-meta {
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-top: 2px;
  }
  .station-zone {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.5px;
    color: var(--accent);
    text-transform: uppercase;
    margin-top: 3px;
  }
  .brand-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 5px;
  }
  .list-overflow {
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    padding: 8px;
    border: 1px dashed var(--border);
    border-radius: 4px;
    margin-top: 4px;
  }

  /* MAP */
  #map { flex: 1; background: var(--navy2); }

  .zone-header {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 8px 6px 4px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 4px;
  }
  .no-results {
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    padding: 32px 16px;
  }

  /* POPUP MAP */
  .leaflet-popup-content-wrapper {
    background: var(--navy2) !important;
    border: 1px solid var(--accent) !important;
    border-radius: 6px !important;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5) !important;
    color: var(--text) !important;
  }
  .leaflet-popup-tip { background: var(--navy2) !important; }
  .popup-inner { font-family: 'Barlow', sans-serif; min-width: 200px; max-width: 260px; }
  .popup-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px;
    font-weight: 800;
    color: var(--accent);
    margin-bottom: 4px;
  }
  .popup-row { font-size: 12px; color: #94a3b8; margin: 2px 0; }
  .popup-row b { color: var(--text); }

  /* POPUP COMPARE TABLE */
  .popup-compare {
    width: 100%;
    border-collapse: collapse;
    margin: 8px 0 4px;
    font-size: 12px;
  }
  .popup-compare th {
    text-align: left;
    color: var(--muted);
    font-weight: 600;
    border-bottom: 1px solid var(--border);
    padding: 3px 4px;
    font-size: 10px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .popup-compare th:last-child { text-align: right; }
  .popup-compare td {
    padding: 4px;
    color: var(--text);
    border-bottom: 1px solid rgba(30,58,95,0.4);
  }
  .popup-compare tr:last-child td { border-bottom: none; }
  .pc-best { background: rgba(34,197,94,0.1); }
  .pc-best td { color: var(--green) !important; font-weight: 700; }
  .pc-price {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    text-align: right;
    white-space: nowrap;
  }
  .popup-best {
    background: rgba(34,197,94,0.1);
    border: 1px solid rgba(34,197,94,0.35);
    border-radius: 4px;
    padding: 5px 8px;
    font-size: 12px;
    color: var(--green);
    text-align: center;
    margin: 4px 0 8px;
    font-weight: 600;
  }
  .popup-api-note {
    font-size: 9px;
    color: var(--muted);
    text-align: right;
    margin-bottom: 3px;
  }
  .popup-gmaps {
    display: block;
    margin-top: 6px;
    background: #1a73e8;
    color: #fff;
    text-align: center;
    padding: 5px 8px;
    border-radius: 4px;
    font-size: 12px;
    font-weight: 600;
    text-decoration: none;
    letter-spacing: 0.3px;
  }
  .popup-gmaps:hover { background: #1557b0; }

  .btn-admin {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 4px;
    padding: 5px 8px;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-admin:hover { border-color: var(--accent); color: var(--accent); }

  /* LOADING OVERLAY */
  .loading-overlay {
    position: fixed;
    inset: 0;
    background: rgba(15,23,42,0.93);
    z-index: 9999;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
  }
  .loading-overlay.hidden { display: none; }
  .loading-spin {
    width: 44px; height: 44px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 1px;
  }
  .loading-sub { font-size: 11px; color: var(--muted); margin-top: -8px; }

  /* TOAST */
  .toast-msg {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--navy2);
    border: 1px solid var(--accent);
    border-radius: 6px;
    padding: 8px 16px;
    font-size: 13px;
    color: var(--text);
    z-index: 8000;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
    white-space: nowrap;
    max-width: 90vw;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .toast-msg.show { opacity: 1; }

  /* CLUSTER OVERRIDE */
  .marker-cluster-small, .marker-cluster-medium, .marker-cluster-large {
    background-color: rgba(249,115,22,0.2) !important;
  }
  .marker-cluster-small div, .marker-cluster-medium div, .marker-cluster-large div {
    background-color: rgba(249,115,22,0.85) !important;
    color: white !important;
    font-family: 'Barlow Condensed', sans-serif !important;
    font-weight: 700 !important;
    font-size: 13px !important;
  }

  @media (max-width: 720px) {
    header { padding: 0 10px; height: 48px; gap: 8px; }
    .logo { font-size: 16px; }
    .logo-sub { display: none; }
    .btn-routes { font-size: 12px; padding: 5px 9px; }
    .btn-routes svg { display: none; }
    .total-badge { display: none; }
    .btn-admin { padding: 4px 7px; font-size: 13px; }
    .routes-wrapper { position: static; }
    .routes-dropdown {
      position: fixed;
      top: 48px;
      left: 0;
      right: 0;
      width: 100%;
      max-height: 70vh;
      overflow-y: auto;
      border-radius: 0 0 8px 8px;
      border-left: none;
      border-right: none;
    }
    .main { flex-direction: column-reverse; height: calc(100vh - 48px); }
    #map { width: 100%; height: 52%; flex: none; }
    .sidebar {
      width: 100%;
      height: 48%;
      border-right: none;
      border-top: 2px solid var(--border);
      flex-shrink: 0;
    }
    .sidebar-top { padding: 7px; gap: 5px; }
    .search-box { padding: 6px 10px; font-size: 13px; }
    .filter-btn { padding: 2px 6px; font-size: 9px; }
    .sort-row { gap: 5px; }
    .sort-label { font-size: 10px; }
    .sort-select { font-size: 11px; }
    .route-banner { padding: 4px 8px; }
    .route-banner-name { font-size: 11px; }
    .btn-clear-route { font-size: 10px; padding: 1px 6px; }
    .station-card { padding: 7px 9px; }
    .station-name { font-size: 13px; }
    .station-meta { font-size: 10px; }
    .station-zone { font-size: 9px; }
    .leaflet-popup-content-wrapper { font-size: 13px; }
  }
</style>
</head>
<body>

<header>
  <div class="routes-wrapper">
    <button class="btn-routes" id="btnRoutes" onclick="toggleRoutes()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
      RUTAS GPS
    </button>
    <div class="routes-dropdown" id="routesDropdown">
      <div class="routes-note">🚛 Rutas sin peaje · acceso camiones · A-x autovías gratuitas</div>
      <div id="routesList"></div>
    </div>
  </div>

  <div class="logo">ADMI<span>LOGISTIC</span><span class="logo-sub" style="font-weight:400;font-size:15px;color:var(--muted)"> · Gasolineras Camión</span></div>

  <div class="header-right">
    <div class="total-badge" id="totalBadge">— estaciones</div>
    <button class="btn-admin" onclick="loginAdmin()" title="Acceso administrador">🔒</button>
  </div>
</header>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-top">
      <input class="search-box" id="searchBox" type="text" placeholder="🔍  Buscar estación, localidad, provincia..."
        oninput="if(typeof renderList==='function'){renderList();updateMarkers();}"
        onkeyup="if(typeof renderList==='function'){renderList();updateMarkers();}">
      <div class="filters" id="zoneFilters"></div>
      <div id="routeBanner" style="display:none" class="route-banner">
        <span class="route-banner-name" id="routeBannerName"></span>
        <button class="btn-clear-route" onclick="clearRouteFilter()">✕ Todas</button>
      </div>
      <div class="sort-row">
        <span class="sort-label">Ordenar:</span>
        <select class="sort-select" id="sortSelect" onchange="renderList()">
          <option value="name_asc">Nombre A-Z</option>
          <option value="zone_asc">Zona/CC.AA.</option>
        </select>
      </div>
    </div>
    <div class="station-list" id="stationList"></div>
  </div>
  <div id="map"></div>
</div>

<div id="loadingOverlay" class="loading-overlay">
  <div class="loading-spin"></div>
  <div class="loading-text">CARGANDO PRECIOS</div>
  <div class="loading-sub">API Ministerio de Energía · tiempo real</div>
</div>
<div id="toastMsg" class="toast-msg"></div>

<script>
// ── CONFIGURACIÓN ─────────────────────────────────────────────────────────────
const API_URL = 'https://sedeaplicaciones.minetur.gob.es/ServiciosRESTCarburantes/PreciosCarburantes/EstacionesTerrestres/';
const GALP_DISCOUNT = 0.16;
const LIST_MAX = 250;
const ANDAMUR_NEARBY_KM = 5;
const BRANDS_FILTER = ['REPSOL', 'CAMPSA', 'PETRONOR'];

// ── PROVINCE → ZONA ───────────────────────────────────────────────────────────
const PROVINCE_TO_ZONE = {
  'Almería':'ANDALUCÍA','Cádiz':'ANDALUCÍA','Córdoba':'ANDALUCÍA','Granada':'ANDALUCÍA',
  'Huelva':'ANDALUCÍA','Jaén':'ANDALUCÍA','Málaga':'ANDALUCÍA','Sevilla':'ANDALUCÍA',
  'Huesca':'ARAGÓN','Teruel':'ARAGÓN','Zaragoza':'ARAGÓN',
  'Asturias':'ASTURIAS',
  'Illes Balears':'BALEARES','Islas Baleares':'BALEARES',
  'Las Palmas':'CANARIAS','Santa Cruz de Tenerife':'CANARIAS',
  'Cantabria':'CANTABRIA',
  'Ávila':'CASTILLA Y LEÓN','Burgos':'CASTILLA Y LEÓN','León':'CASTILLA Y LEÓN',
  'Palencia':'CASTILLA Y LEÓN','Salamanca':'CASTILLA Y LEÓN','Segovia':'CASTILLA Y LEÓN',
  'Soria':'CASTILLA Y LEÓN','Valladolid':'CASTILLA Y LEÓN','Zamora':'CASTILLA Y LEÓN',
  'Albacete':'CASTILLA-LA MANCHA','Ciudad Real':'CASTILLA-LA MANCHA',
  'Cuenca':'CASTILLA-LA MANCHA','Guadalajara':'CASTILLA-LA MANCHA','Toledo':'CASTILLA-LA MANCHA',
  'Barcelona':'CATALUÑA','Girona':'CATALUÑA','Lleida':'CATALUÑA',
  'Lérida':'CATALUÑA','Tarragona':'CATALUÑA',
  'Ceuta':'CEUTA',
  'Badajoz':'EXTREMADURA','Cáceres':'EXTREMADURA',
  'A Coruña':'GALICIA','La Coruña':'GALICIA','Lugo':'GALICIA','Ourense':'GALICIA','Pontevedra':'GALICIA',
  'La Rioja':'LA RIOJA',
  'Madrid':'C. DE MADRID',
  'Melilla':'MELILLA',
  'Murcia':'MURCIA',
  'Navarra':'NAVARRA',
  'Álava':'PAÍS VASCO','Guipúzcoa':'PAÍS VASCO','Vizcaya':'PAÍS VASCO',
  'Alicante':'C. VALENCIANA','Castellón':'C. VALENCIANA','Valencia':'C. VALENCIANA'
};

// ── CORREDORES DE RUTA (bounding boxes [latMin, lngMin, latMax, lngMax]) ──────
const ROUTE_CORRIDORS = {
  'base':       [40.10, -4.05, 40.55, -3.35],
  'pinto-bcn':  [40.10, -3.90, 42.10, 2.55],
  'bcn-pinto':  [40.10, -3.90, 42.10, 2.55],
  'bcn-val':    [39.25, -0.75, 41.55, 2.35],
  'val-bcn':    [39.25, -0.75, 41.55, 2.35],

// ── UTILIDADES ────────────────────────────────────────────────────────────────
function distanceKm(lat1, lng1, lat2, lng2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function parseApiNum(str) {
  if (!str || !str.trim()) return null;
  const n = parseFloat(str.trim().replace(',', '.'));
  return isNaN(n) ? null : n;
}

function fmtPrice(p) {
  if (p == null) return '—';
  return p.toFixed(3).replace('.', ',') + ' €/l';
}

function isBrandMatch(rotulo) {
  const r = (rotulo || '').toUpperCase();
  return BRANDS_FILTER.some(b => r.includes(b));
}

function getBrandType(rotulo) {
  const r = (rotulo || '').toUpperCase();
  if (r.includes('GALP')) return 'galp';
  if (r.includes('ANDAMUR')) return 'andamur';
  if (r.includes('REPSOL') || r.includes('CAMPSA') || r.includes('PETRONOR')) return 'repsol';
  return 'other';
}

function getBrandColor(brandType) {
  if (brandType === 'galp') return '#0066cc';
  if (brandType === 'andamur') return '#f59e0b';
  if (brandType === 'repsol') return '#e30613';
  return '#64748b';
}

function zoneFromProvincia(provincia) {
  if (!provincia) return 'OTRAS';
  if (PROVINCE_TO_ZONE[provincia]) return PROVINCE_TO_ZONE[provincia];
  const pLow = provincia.toLowerCase();
  const key = Object.keys(PROVINCE_TO_ZONE).find(k => k.toLowerCase() === pLow);
  return key ? PROVINCE_TO_ZONE[key] : 'OTRAS';
}

// ── API MINETUR ───────────────────────────────────────────────────────────────
async function fetchMinetur() {
  const controller = new AbortController();
  const tid = setTimeout(() => controller.abort(), 20000);
  try {
    const resp = await fetch(API_URL, { signal: controller.signal });
    clearTimeout(tid);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    return await resp.json();
  } catch(e) {
    clearTimeout(tid);
    throw e;
  }
}

// Filtro POSITIVO: solo estaciones cuya dirección indica claramente autopista/autovía.
// Ejemplos válidos: "AUTOVÍA A-4 KM 185", "AUTOPISTA AP-7 PK 200", "N-340 KM 1062",
//                   "A-1 KM 232", "CTRA. A-2 KM 309", "ÁREA DE SERVICIO A-6"
function isHighwayStation(dir) {
  if (!dir) return false;
  const d = dir.toUpperCase().trim();
  // Palabras clave explícitas de autopista/área de servicio
  if (/AUTOV[IÍ][AO]|AUTOPISTA|ÁREA DE SERVICIO|AREA DE SERVICIO|AREA SERVICIO/.test(d)) return true;
  // Código de carretera (A-, AP-, N-, CN-, E-) seguido de número + KM/PK
  if (/\b(AP?|N|CN|E|R)-\d{1,3}\b[\s,].*?\b(KM|PK|P\.K)\.?\b/.test(d)) return true;
  if (/\b(KM|PK)\b.*?\b(AP?|N|CN)-\d{1,3}\b/.test(d)) return true;
  // Dirección que empieza directamente con código de carretera nacional/autovía
  if (/^(AUTOV|AUTOP|A-\d|AP-\d|N-\d|CN-\d|CTRA\.?\s*(N-|A-|AP-|CN-))/.test(d)) return true;
  return false;
}

function parseMinetur(data) {
  const list = data.ListaEESSPrecio || [];
  const result = [];
  list.forEach((e, idx) => {
    const rotulo = (e['Rótulo'] || '').trim();
    if (!isBrandMatch(rotulo)) return;
    const precioA = parseApiNum(e['Precio Gasoleo A']);
    if (!precioA || precioA < 0.5 || precioA > 4) return;
    const lat = parseApiNum(e['Latitud']);
    const lng = parseApiNum(e['Longitud (WGS84)']);
    if (!lat || !lng) return;
    const dir = (e['Dirección'] || '').trim();
    if (!isHighwayStation(dir)) return; // solo estaciones en autopista/autovía
    result.push({
      id: idx,
      name: rotulo,
      rotulo,
      brandType: getBrandType(rotulo),
      via: (e['Dirección'] || '').trim(),
      localidad: (e['Localidad'] || '').trim(),
      provincia: (e['Provincia'] || '').trim(),
      cp: (e['C.P.'] || '').trim(),
      zone: zoneFromProvincia((e['Provincia'] || '').trim()),
      price: precioA,
      lat, lng,
      ideess: e['IDEESS'] || '',
      fromApi: true
    });
  });
  return result;
}

function parseRaw(raw) {
  const lines = raw.trim().split('\n');
  const result = [];
  lines.forEach((line, idx) => {
    const parts = line.split('\t');
    if (parts.length < 5) return;
    const name = parts[0].trim();
    const via = parts[1].trim();
    const localidad = parts[2].trim();
    const provincia = parts[3].trim();
    const price = parseFloat(parts[4].trim().replace(',', '.'));
    const zone = parts[5] ? parts[5].trim() : zoneFromProvincia(provincia);
    if (isNaN(price)) return;
    const key = `${localidad}|${provincia}`;
    let coords = COORDS[key] || null;
    if (!coords) {
      const fb = Object.keys(COORDS).find(k => k.startsWith(localidad + '|'));
      coords = fb ? COORDS[fb] : null;
    }
    const jitter = () => (Math.random() - 0.5) * 0.008;
    result.push({
      id: 10000 + idx,
      name, via, localidad, provincia, price, zone,
      rotulo: name.toUpperCase(),
      brandType: getBrandType(name),
      cp: '', fromApi: false,
      lat: coords ? coords[0] + jitter() : null,
      lng: coords ? coords[1] + jitter() : null
    });
  });
  return result;
}

async function loadStations() {
  showLoading(true);
  // Red pactada siempre presente
  const localStations = parseRaw(RAW_DATA);
  try {
    // API solo para Repsol/Campsa en autopista (BRANDS_FILTER + isHighwayStation)
    const cached = sessionStorage.getItem('minetur_data');
    const cacheTs = parseInt(sessionStorage.getItem('minetur_ts') || '0');
    let data;
    if (cached && Date.now() - cacheTs < 30 * 60 * 1000) {
      data = JSON.parse(cached);
    } else {
      data = await fetchMinetur();
      try {
        sessionStorage.setItem('minetur_data', JSON.stringify(data));
        sessionStorage.setItem('minetur_ts', Date.now().toString());
      } catch(e) {}
    }
    dataSource = 'api';
    return [...localStations, ...parseMinetur(data)];
  } catch(e) {
    dataSource = 'local';
    return localStations;
  } finally {
    showLoading(false);
  }
}

// ── CÁLCULO DE PRECIOS / COMPARADOR ──────────────────────────────────────────
function findNearestAndamur(station) {
  if (station.brandType === 'andamur') return null;
  let nearest = null;
  let minDist = ANDAMUR_NEARBY_KM;
  for (const s of stations) {
    if (s.brandType !== 'andamur' || !s.lat) continue;
    const d = distanceKm(station.lat, station.lng, s.lat, s.lng);
    if (d < minDist) { minDist = d; nearest = s; }
  }
  return nearest ? { station: nearest, distM: minDist * 1000 } : null;
}

function computePrices(station) {
  if (!station.price) return null;
  const result = {};
  if (station.brandType === 'galp') {
    result.surtidor = station.price;
    result.galp = +(station.price - GALP_DISCOUNT).toFixed(3);
    result.solred = station.price;
  } else if (station.brandType === 'repsol') {
    result.surtidor = station.price;
    result.solred = station.price;
  } else if (station.brandType === 'andamur') {
    result.surtidor = station.price;
    result.andamur = station.price;
  } else {
    result.surtidor = station.price;
    result.solred = station.price;
  }
  // Andamur cercano (si no es Andamur)
  if (station.lat && station.brandType !== 'andamur') {
    const nearby = findNearestAndamur(station);
    if (nearby) result.andamurNearby = { price: nearby.station.price, name: nearby.station.name, distM: nearby.distM };
  }
  // Mejor opción
  const options = [];
  if (result.galp != null) options.push({ label: 'Tarjeta Galp', price: result.galp });
  if (result.solred != null && (result.galp == null || result.solred < result.galp)) options.push({ label: 'Tarjeta Solred', price: result.solred });
  if (result.andamur != null) options.push({ label: 'Andamur', price: result.andamur });
  if (result.andamurNearby) options.push({ label: 'Andamur cercano', price: result.andamurNearby.price });
  if (options.length > 0) {
    const best = options.reduce((a, b) => a.price < b.price ? a : b);
    result.best = best.price;
    result.bestLabel = best.label;
  }
  return result;
}

function computeAllPrices() {
  stations.forEach(s => { s.priceData = computePrices(s); });
}

// ── FILTRO POR RUTA ───────────────────────────────────────────────────────────
function stationMatchesRoute(s, routeId) {
  const corridor = ROUTE_CORRIDORS[routeId];
  if (corridor && s.lat != null) {
    const [latMin, lngMin, latMax, lngMax] = corridor;
    if (s.lat >= latMin && s.lat <= latMax && s.lng >= lngMin && s.lng <= lngMax) return true;
  }
  return false;
}

function filterByRoute(routeId, routeName) {

  document.getElementById('routesDropdown').classList.remove('open');

  if (visible.length > 0 && map) map.fitBounds(L.latLngBounds(visible.map(s => [s.lat, s.lng])), { padding: [40, 40] });
}

// ── ZONAS Y FILTROS ───────────────────────────────────────────────────────────
function buildZones() {
  const filtered = activeRoute ? filteredStations(true) : stations;
  const zones = ['TODAS', ...new Set(filtered.map(s => s.zone))].sort((a, b) => a === 'TODAS' ? -1 : a.localeCompare(b));
  const container = document.getElementById('zoneFilters');
  container.innerHTML = '';
  zones.forEach(z => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (z === activeZone ? ' active' : '');
    btn.textContent = z;
    btn.onclick = () => { activeZone = z; buildZones(); renderList(); updateMarkers(); };
    container.appendChild(btn);
  });
}

function filteredStations(skipZone = false) {
  const q = document.getElementById('searchBox').value.toLowerCase().trim();
  return stations.filter(s => {
    const matchZone = skipZone || activeZone === 'TODAS' || s.zone === activeZone;
    const matchQ = !q || s.name.toLowerCase().includes(q)
      || s.localidad.toLowerCase().includes(q)
      || s.provincia.toLowerCase().includes(q)
      || s.via.toLowerCase().includes(q)
      || (s.cp && s.cp.includes(q));
    const matchRoute = !activeRoute || stationMatchesRoute(s, activeRoute);
    return matchZone && matchQ && matchRoute;
  });
}

function sortedStations(list) {
  const sort = document.getElementById('sortSelect').value;
  return [...list].sort((a, b) => {
    if (sort === 'name_asc') return a.name.localeCompare(b.name);
    if (sort === 'zone_asc') return a.zone.localeCompare(b.zone) || a.name.localeCompare(b.name);
    return 0;
  });
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function renderList() {
  const list = sortedStations(filteredStations());
  const container = document.getElementById('stationList');
  container.innerHTML = '';
  document.getElementById('totalBadge').textContent = `${list.length} estaciones`;

  if (!list.length) {
    container.innerHTML = '<div class="no-results">Sin resultados para esta búsqueda</div>';
    return;
  }

  const displayList = list.slice(0, LIST_MAX);
  let lastZone = null;
  const sort = document.getElementById('sortSelect').value;

  displayList.forEach(s => {
    if (sort === 'zone_asc' && s.zone !== lastZone) {
      const h = document.createElement('div');
      h.className = 'zone-header';
      h.textContent = s.zone;
      container.appendChild(h);
      lastZone = s.zone;
    }
    const card = document.createElement('div');
    card.className = 'station-card' + (s.id === selectedId ? ' selected' : '');
    card.dataset.id = s.id;
    const p = s.priceData;
    const bestHint = p && p.bestLabel ? `<span style="font-size:10px;color:var(--green);margin-left:4px;">· ${p.bestLabel} ${fmtPrice(p.best)}</span>` : '';
    card.innerHTML = `
      <div class="brand-dot" style="background:${getBrandColor(s.brandType)};margin-top:5px;"></div>
      <div class="station-card-body">
        <div class="station-name">${s.name}</div>
        <div class="station-meta">${s.via ? s.via + ' · ' : ''}${s.localidad}, ${s.provincia}</div>
        <div class="station-zone">${s.zone}${bestHint}</div>
      </div>
    `;
    card.onclick = () => selectStation(s.id);
    container.appendChild(card);
  });

  if (list.length > LIST_MAX) {
    const overflow = document.createElement('div');
    overflow.className = 'list-overflow';
    overflow.textContent = `Mostrando ${LIST_MAX} de ${list.length} · Usa el mapa o busca para filtrar`;
    container.appendChild(overflow);
  }
}

function makePopupHtml(s) {

  let compareHtml = '';

  if (p) {
    const rows = [];
    rows.push(`<tr><td>⛽ Surtidor</td><td class="pc-price">${fmtPrice(p.surtidor)}</td></tr>`);
    if (p.galp != null) {
      const isBest = p.bestLabel === 'Tarjeta Galp';
      rows.push(`<tr${isBest ? ' class="pc-best"' : ''}><td>${isBest ? '🏆 ' : ''}Tarjeta Galp <span style="font-size:10px;color:var(--muted);">(-${GALP_DISCOUNT.toFixed(2)}€)</span></td><td class="pc-price">${fmtPrice(p.galp)}</td></tr>`);
    }
    if (p.solred != null && p.galp == null) {
      const isBest = p.bestLabel === 'Tarjeta Solred';
      rows.push(`<tr${isBest ? ' class="pc-best"' : ''}><td>${isBest ? '🏆 ' : ''}Tarjeta Solred</td><td class="pc-price">${fmtPrice(p.solred)}</td></tr>`);
    }
    if (p.andamur != null) {
      rows.push(`<tr><td>Andamur</td><td class="pc-price">${fmtPrice(p.andamur)}</td></tr>`);
    }
    if (p.andamurNearby) {
      const d = p.andamurNearby.distM < 1000 ? `${Math.round(p.andamurNearby.distM)}m` : `${(p.andamurNearby.distM/1000).toFixed(1)}km`;
      const isBest = p.bestLabel === 'Andamur cercano';
      rows.push(`<tr${isBest ? ' class="pc-best"' : ''}><td>${isBest ? '🏆 ' : ''}Andamur (${d})</td><td class="pc-price">${fmtPrice(p.andamurNearby.price)}</td></tr>`);
    }
    compareHtml = `
      <table class="popup-compare">
        <thead><tr><th>Opción de pago</th><th>€/l</th></tr></thead>
        <tbody>${rows.join('')}</tbody>
      </table>
      ${p.bestLabel ? `<div class="popup-best">✅ Mejor: <b>${p.bestLabel}</b> · ${fmtPrice(p.best)}</div>` : ''}
    `;
  }

  const sourceNote = s.fromApi ? `<div class="popup-api-note">Precio en tiempo real · API MINETUR</div>` : `<div class="popup-api-note">Precio local (sin conexión API)</div>`;

  return `
    <div class="popup-inner">
      <div class="popup-name">${s.name}</div>
      <div class="popup-row"><b>Dirección:</b> ${s.via || '—'}</div>
      <div class="popup-row"><b>Localidad:</b> ${s.localidad}, ${s.provincia}${s.cp ? ' (' + s.cp + ')' : ''}</div>
      ${sourceNote}
      ${compareHtml}
      <a href="https://www.google.com/maps/search/?api=1&query=${s.lat},${s.lng}" target="_blank" rel="noopener" class="popup-gmaps">📍 Ver en Google Maps</a>
    </div>
  `;
}

function makeMarkerIcon() {
  return L.divIcon({
    className: '',
    html: `<svg width="20" height="28" viewBox="0 0 20 28" xmlns="http://www.w3.org/2000/svg">
      <path d="M10 0C4.477 0 0 4.477 0 10c0 7.18 10 18 10 18s10-10.82 10-18C20 4.477 15.523 0 10 0z" fill="#f97316" opacity="0.95"/>
      <circle cx="10" cy="10" r="4" fill="white" opacity="0.9"/>
    </svg>`,
    iconSize: [20, 28],
    iconAnchor: [10, 28],
    popupAnchor: [0, -30]
  });
}

function selectStation(id) {
  selectedId = id;
  const s = stations.find(x => x.id === id);
  if (!s) return;
  renderList();
  if (s.lat && map) {
    map.setView([s.lat, s.lng], 14, { animate: true });
    if (markers[id]) markers[id].openPopup();
  }
}

// ── MARKERS + CLUSTER ─────────────────────────────────────────────────────────
function rebuildMarkers() {
  clusterGroup.clearLayers();
  markers = {};
  const visible = new Set(filteredStations().map(s => s.id));
  stations.forEach(s => {
    if (!s.lat) return;
    const m = L.marker([s.lat, s.lng], { icon: makeMarkerIcon() });
    m.bindPopup(makePopupHtml(s), { maxWidth: 280 });
    m.on('click', () => {
      selectedId = s.id;
      renderList();
      setTimeout(() => {
        const card = document.querySelector(`[data-id="${s.id}"]`);
        if (card) card.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }, 150);
    });
    markers[s.id] = m;
    if (visible.has(s.id)) clusterGroup.addLayer(m);
  });
}

function updateMarkers() {
  const visible = new Set(filteredStations().map(s => s.id));
  const toAdd = [], toRemove = [];
  stations.forEach(s => {
    if (!s.lat || !markers[s.id]) return;
    const inCluster = clusterGroup.hasLayer(markers[s.id]);
    if (visible.has(s.id) && !inCluster) toAdd.push(markers[s.id]);
    else if (!visible.has(s.id) && inCluster) toRemove.push(markers[s.id]);
  });
  if (toRemove.length) clusterGroup.removeLayers(toRemove);
  if (toAdd.length) clusterGroup.addLayers(toAdd);
}

// ── INIT ─────────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
  buildRoutesList();

  map = L.map('map', { center: [40.4, -3.7], zoom: 6, zoomControl: true });
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap © CARTO',
    subdomains: 'abcd',
    maxZoom: 19
  }).addTo(map);

  clusterGroup = L.markerClusterGroup({
    chunkedLoading: true,
    maxClusterRadius: 50,
    showCoverageOnHover: false
  });
  map.addLayer(clusterGroup);

  stations = await loadStations();
  computeAllPrices();

  buildZones();
  renderList();
  rebuildMarkers();

  if (dataSource === 'api') {
    showToast(`✓ ${stations.length} estaciones cargadas (GALP, Repsol, Campsa, Petronor, Andamur)`);
  }

  document.getElementById('searchBox').addEventListener('input', () => {
    renderList();
    updateMarkers();
  });
});
</script>
</body>
