<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AdmiLogistic · Admin Gasolineras</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=JetBrains+Mono:wght@400;600&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --navy: #0f172a;
    --navy2: #1e293b;
    --panel: #162032;
    --accent: #f97316;
    --accent2: #fb923c;
    --green: #22c55e;
    --yellow: #eab308;
    --red: #ef4444;
    --text: #e2e8f0;
    --muted: #64748b;
    --border: #1e3a5f;
    --cheap: #22c55e;
    --mid: #eab308;
    --exp: #ef4444;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Barlow', sans-serif;
    background: var(--navy);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* HEADER */
  header {
    background: var(--navy2);
    border-bottom: 2px solid var(--accent);
    padding: 0 14px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    flex-shrink: 0;
    z-index: 1000;
  }
  .logo {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 20px;
    font-weight: 800;
    letter-spacing: 1px;
    color: var(--accent);
    white-space: nowrap;
  }
  .logo span { color: var(--text); }
  .logo .admin-tag {
    font-size: 11px;
    font-weight: 700;
    background: #7c3aed;
    color: white;
    padding: 2px 6px;
    border-radius: 3px;
    letter-spacing: 0.5px;
    vertical-align: middle;
    margin-left: 4px;
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .last-update {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }
  .btn-update {
    background: var(--accent);
    color: white;
    border: none;
    padding: 7px 14px;
    border-radius: 4px;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: background 0.2s;
    white-space: nowrap;
  }
  .btn-update:hover { background: var(--accent2); }
  .total-badge {
    background: var(--border);
    border: 1px solid var(--accent);
    border-radius: 4px;
    padding: 4px 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    white-space: nowrap;
  }
  .legend {
    display: flex;
    gap: 10px;
    align-items: center;
    font-size: 11px;
    color: var(--muted);
  }
  .legend-dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 3px;
  }

  /* ROUTES PANEL */
  .routes-wrapper {
    position: relative;
    flex-shrink: 0;
  }
  .btn-routes {
    background: var(--navy);
    border: 1px solid var(--border);
    color: var(--accent);
    padding: 6px 11px;
    border-radius: 4px;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.5px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .btn-routes:hover, .btn-routes.open { border-color: var(--accent); background: #1a2640; }
  .routes-dropdown {
    display: none;
    position: absolute;
    top: calc(100% + 6px);
    left: 0;
    background: var(--panel);
    border: 1px solid var(--accent);
    border-radius: 6px;
    padding: 10px;
    width: 300px;
    z-index: 3000;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
  }
  .routes-dropdown.open { display: block; }
  .routes-note {
    font-size: 10px;
    color: var(--muted);
    padding: 4px 6px 8px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 8px;
    line-height: 1.4;
  }
  .route-group { margin-bottom: 8px; }
  .route-group:last-child { margin-bottom: 0; }
  .rg-header {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.5px;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
    padding-bottom: 3px;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .route-link {
    display: flex;
    align-items: center;
    justify-content: space-between;
    color: var(--text);
    text-decoration: none;
    font-size: 12px;
    padding: 4px 8px;
    border-radius: 3px;
    margin-bottom: 2px;
    transition: background 0.15s;
    gap: 8px;
  }
  .route-link:hover { background: var(--navy); color: var(--accent); }
  .route-link-name { flex: 1; min-width: 0; }
  .route-via {
    font-size: 10px;
    color: var(--muted);
    display: block;
    margin-top: 1px;
  }
  .gps-badge {
    font-size: 10px;
    background: #052e16;
    color: var(--green);
    border: 1px solid var(--green);
    border-radius: 3px;
    padding: 2px 5px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .route-link:hover .gps-badge { background: #064e24; }
  .route-link { cursor: pointer; }
  .route-banner {
    background: #0a1f38;
    border: 1px solid var(--accent);
    border-radius: 4px;
    padding: 5px 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .route-banner-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 12px;
    color: var(--accent);
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .btn-clear-route {
    background: none;
    border: 1px solid var(--muted);
    color: var(--muted);
    border-radius: 3px;
    padding: 2px 7px;
    font-size: 11px;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .btn-clear-route:hover { border-color: var(--text); color: var(--text); }

  /* LAYOUT */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* SIDEBAR */
  .sidebar {
    width: 340px;
    flex-shrink: 0;
    background: var(--panel);
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    overflow: hidden;
  }
  .sidebar-top {
    padding: 10px;
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 7px;
  }
  .search-box {
    background: var(--navy);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 8px 12px;
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    font-size: 13px;
    width: 100%;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-box:focus { border-color: var(--accent); }
  .search-box::placeholder { color: var(--muted); }
  .filters {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
  }
  .filter-btn {
    background: var(--navy);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 3px 9px;
    border-radius: 3px;
    font-size: 10px;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: white; }
  .filter-btn:hover:not(.active) { border-color: var(--accent); color: var(--accent); }
  .sort-row { display: flex; align-items: center; gap: 8px; }
  .sort-label { font-size: 11px; color: var(--muted); white-space: nowrap; }
  .sort-select {
    flex: 1;
    background: var(--navy);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 4px 8px;
    border-radius: 3px;
    font-size: 12px;
    outline: none;
  }
  .stats-row { display: flex; gap: 6px; }
  .stat-chip {
    flex: 1;
    background: var(--navy);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 6px 8px;
    text-align: center;
  }
  .stat-chip .sv { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 600; }
  .stat-chip .sl { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 1px; }
  .sv.green { color: var(--green); }
  .sv.yellow { color: var(--yellow); }
  .sv.red { color: var(--red); }

  .station-list {
    flex: 1;
    overflow-y: auto;
    padding: 6px;
  }
  .station-list::-webkit-scrollbar { width: 4px; }
  .station-list::-webkit-scrollbar-track { background: var(--navy); }
  .station-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .station-card {
    background: var(--navy);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 9px 11px;
    margin-bottom: 5px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .station-card:hover { border-color: var(--accent); background: #1a2640; }
  .station-card.selected { border-color: var(--accent); background: #1e2e45; }
  .price-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    font-weight: 600;
    min-width: 52px;
    text-align: right;
    flex-shrink: 0;
  }
  .price-badge.cheap { color: var(--cheap); }
  .price-badge.mid { color: var(--mid); }
  .price-badge.exp { color: var(--red); }
  .station-info { flex: 1; min-width: 0; }
  .station-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 700;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text);
  }
  .station-meta {
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-top: 1px;
  }
  .station-zone {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.5px;
    color: var(--accent);
    text-transform: uppercase;
    margin-top: 2px;
  }

  /* MAP */
  #map { flex: 1; background: var(--navy2); }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 9999;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--panel);
    border: 1px solid var(--accent);
    border-radius: 8px;
    padding: 28px;
    width: 580px;
    max-width: 95vw;
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal h2 { font-family: 'Barlow Condensed', sans-serif; font-size: 20px; font-weight: 800; color: var(--accent); margin-bottom: 6px; }
  .modal p { font-size: 13px; color: var(--muted); margin-bottom: 16px; line-height: 1.5; }
  .modal textarea {
    width: 100%;
    height: 280px;
    background: var(--navy);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 12px;
    resize: vertical;
    outline: none;
    line-height: 1.6;
    margin-bottom: 12px;
  }
  .modal textarea:focus { border-color: var(--accent); }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
  .btn-cancel { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 8px 20px; border-radius: 4px; cursor: pointer; font-family: 'Barlow Condensed', sans-serif; font-weight: 600; font-size: 14px; }
  .btn-cancel:hover { border-color: var(--muted); }
  .btn-parse { background: var(--accent); border: none; color: white; padding: 8px 20px; border-radius: 4px; cursor: pointer; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 14px; letter-spacing: 0.5px; }
  .btn-parse:hover { background: var(--accent2); }
  .parse-result { font-family: 'JetBrains Mono', monospace; font-size: 11px; padding: 8px 12px; border-radius: 4px; margin-bottom: 10px; display: none; }
  .parse-result.ok { background: #052e16; border: 1px solid var(--green); color: var(--green); display: block; }
  .parse-result.err { background: #450a0a; border: 1px solid var(--red); color: var(--red); display: block; }

  @media (max-width: 720px) {
    /* HEADER */
    header { padding: 0 10px; height: 48px; gap: 6px; }
    .logo { font-size: 16px; }
    .logo-sub { display: none; }
    .admin-tag { font-size: 9px; padding: 1px 4px; }
    .btn-routes { font-size: 12px; padding: 5px 9px; }
    .btn-routes svg { display: none; }
    .total-badge { display: none; }
    .last-update { display: none; }
    .legend { display: none; }
    .btn-update { font-size: 12px; padding: 5px 10px; }

    /* ROUTES DROPDOWN: full screen width */
    .routes-wrapper { position: static; }
    .routes-dropdown {
      position: fixed;
      top: 48px;
      left: 0;
      right: 0;
      width: 100%;
      max-height: 70vh;
      overflow-y: auto;
      border-radius: 0 0 8px 8px;
      border-left: none;
      border-right: none;
    }

    /* LAYOUT: mapa arriba, lista abajo */
    .main { flex-direction: column-reverse; height: calc(100vh - 48px); }
    #map { width: 100%; height: 52%; flex: none; }
    .sidebar {
      width: 100%;
      height: 48%;
      border-right: none;
      border-top: 2px solid var(--border);
      flex-shrink: 0;
    }

    /* SIDEBAR CONTENT */
    .sidebar-top { padding: 7px; gap: 5px; }
    .search-box { padding: 6px 10px; font-size: 13px; }
    .filter-btn { padding: 2px 6px; font-size: 9px; }
    .sort-row { gap: 5px; }
    .sort-label { font-size: 10px; }
    .sort-select { font-size: 11px; }
    .stats-row { gap: 4px; }
    .stat-chip { padding: 4px 5px; }
    .stat-chip .sv { font-size: 12px; }
    .stat-chip .sl { font-size: 8px; }
    .route-banner { padding: 4px 8px; }
    .route-banner-name { font-size: 11px; }
    .btn-clear-route { font-size: 10px; padding: 1px 6px; }

    /* STATION CARDS */
    .station-card { padding: 7px 9px; }
    .station-name { font-size: 13px; }
    .station-meta { font-size: 10px; }
    .station-zone { font-size: 9px; }
    .price-badge { font-size: 13px; min-width: 44px; }
  }

  /* POPUP MAP */
  .leaflet-popup-content-wrapper {
    background: var(--navy2) !important;
    border: 1px solid var(--accent) !important;
    border-radius: 6px !important;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5) !important;
    color: var(--text) !important;
  }
  .leaflet-popup-tip { background: var(--navy2) !important; }
  .popup-inner { font-family: 'Barlow', sans-serif; min-width: 200px; }
  .popup-name { font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 800; color: var(--accent); margin-bottom: 4px; }
  .popup-price { font-family: 'JetBrains Mono', monospace; font-size: 22px; font-weight: 600; margin: 6px 0; }
  .popup-row { font-size: 12px; color: #94a3b8; margin: 2px 0; }
  .popup-row b { color: var(--text); }

  .zone-header {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 8px 6px 4px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 4px;
  }
  .no-results { text-align: center; color: var(--muted); font-size: 13px; padding: 32px 16px; }
</style>
</head>
<body>

<header>
  <!-- Rutas GPS (izquierda) -->
  <div class="routes-wrapper">
    <button class="btn-routes" id="btnRoutes" onclick="toggleRoutes()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
      RUTAS GPS
    </button>
    <div class="routes-dropdown" id="routesDropdown">
      <div class="routes-note">🚛 Rutas sin peaje · acceso camiones · A-x autovías gratuitas</div>
      <div id="routesList"></div>
    </div>
  </div>

  <!-- Logo -->
  <div class="logo">ADMI<span>LOGISTIC</span><span class="logo-sub" style="font-weight:400;font-size:15px;color:var(--muted)"> · Gasolineras</span> <span class="admin-tag">ADMIN</span></div>

  <!-- Derecha -->
  <div class="header-right">
    <div class="legend">
      <span><span class="legend-dot" style="background:var(--green)"></span>Barato</span>
      <span><span class="legend-dot" style="background:var(--yellow)"></span>Medio</span>
      <span><span class="legend-dot" style="background:var(--red)"></span>Caro</span>
    </div>
    <div class="total-badge" id="totalBadge">— estaciones</div>
    <div class="last-update" id="lastUpdate">—</div>
    <button class="btn-update" onclick="openModal()">⬆ Actualizar precios</button>
  </div>
</header>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-top">
      <input class="search-box" id="searchBox" type="text" placeholder="🔍  Buscar estación, localidad, vía..." oninput="if(typeof renderList==='function'){renderList();updateMarkers();}" onkeyup="if(typeof renderList==='function'){renderList();updateMarkers();}">
      <div class="filters" id="zoneFilters"></div>
      <div id="routeBanner" style="display:none" class="route-banner">
        <span class="route-banner-name" id="routeBannerName"></span>
        <button class="btn-clear-route" onclick="clearRouteFilter()">✕ Todas</button>
      </div>
      <div class="sort-row">
        <span class="sort-label">Ordenar:</span>
        <select class="sort-select" id="sortSelect" onchange="renderList()">
          <option value="price_asc">Precio ↑ (más barato primero)</option>
          <option value="price_desc">Precio ↓ (más caro primero)</option>
          <option value="name_asc">Nombre A-Z</option>
          <option value="zone_asc">Zona</option>
        </select>
      </div>
      <div class="stats-row" id="statsRow"></div>
    </div>
    <div class="station-list" id="stationList"></div>
  </div>
  <div id="map"></div>
</div>

<!-- MODAL ACTUALIZAR -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2>⬆ Actualizar precios</h2>
    <p>Pega aquí la tabla de precios (columnas separadas por tabulador). El sistema detectará automáticamente los precios y actualizará el mapa.</p>
    <div id="parseResult" class="parse-result"></div>
    <textarea id="pasteArea" placeholder="Pega aquí el texto con los datos...
Ejemplo:
ANDAMUR La Junquera	AP-7, N-II	La Junquera	Girona	1,603	ZONA JUNQUERA
..."></textarea>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-parse" onclick="parseAndUpdate()">Procesar y actualizar</button>
    </div>
  </div>
</div>

<script>
// ── RUTAS GPS ──────────────────────────────────────────────────────────────────
const ROUTE_GPS = [
  {
    label: 'Base Pinto',
    icon: '🏠',
    routes: [
      { name: 'Zona base · Pinto', via: 'Mosaico Marítimo', routeId: 'base', url: 'https://maps.google.com/maps?q=Pinto,Madrid,España' }
    ]
  },
  {
    label: 'Pinto ↔ Barcelona',
    icon: '🟡',
    routes: [
      { name: '→ Pinto → Barcelona', via: 'A-2 sin peaje', routeId: 'pinto-bcn', url: 'https://www.google.com/maps/dir/?api=1&origin=Pinto,Madrid,España&destination=Barcelona,España&waypoints=Guadalajara,España|Calatayud,Zaragoza,España|Lleida,España&travelmode=driving' },
      { name: '← Barcelona → Pinto', via: 'A-2 sin peaje', routeId: 'bcn-pinto', url: 'https://www.google.com/maps/dir/?api=1&origin=Barcelona,España&destination=Pinto,Madrid,España&waypoints=Lleida,España|Calatayud,Zaragoza,España|Guadalajara,España&travelmode=driving' }
    ]
  },
  {
    label: 'Barcelona ↔ Valencia',
    icon: '🔴',
    routes: [
      { name: '→ Barcelona → Valencia', via: 'AP-7 libre (desde El Vendrell)', routeId: 'bcn-val', url: 'https://www.google.com/maps/dir/?api=1&origin=Barcelona,España&destination=Valencia,España&waypoints=Tarragona,España|Cambrils,España|Vinaròs,España&travelmode=driving' },
      { name: '← Valencia → Barcelona', via: 'AP-7 libre (hasta El Vendrell)', routeId: 'val-bcn', url: 'https://www.google.com/maps/dir/?api=1&origin=Valencia,España&destination=Barcelona,España&waypoints=Sagunto,España|Vinaròs,España|Cambrils,España&travelmode=driving' }
    ]
  },
  {
    label: 'Pinto ↔ Alicante',

let activeRoute = null;
let activeRouteName = '';

function filterByRoute(routeId, routeName) {
  activeRoute = routeId;
  activeRouteName = routeName;
  activeZone = 'TODAS';
  document.getElementById('routesDropdown').classList.remove('open');
  document.getElementById('btnRoutes').classList.remove('open');
  buildZones();
  renderList();
  updateMarkers();
  const banner = document.getElementById('routeBanner');
  if (banner) { document.getElementById('routeBannerName').textContent = routeName; banner.style.display = 'flex'; }
  const visible = filteredStations().filter(s => s.lat);
  if (visible.length > 0 && map) map.fitBounds(L.latLngBounds(visible.map(s => [s.lat, s.lng])), { padding: [40, 40] });
}

function clearRouteFilter() {
  activeRoute = null;
  activeRouteName = '';
  const banner = document.getElementById('routeBanner');
  if (banner) banner.style.display = 'none';
  buildZones();
  renderList();
  updateMarkers();
  if (map) map.setView([40.4, -3.7], 6);
}

function buildRoutesList() {
  const container = document.getElementById('routesList');
  container.innerHTML = ROUTE_GPS.map(group => `
    <div class="route-group">
      <div class="rg-header">${group.icon} ${group.label}</div>
      ${group.routes.map(r => `
        <div class="route-link" onclick="filterByRoute('${r.routeId}', '${r.name}')">
          <span class="route-link-name">
            ${r.name}
            <span class="route-via">${r.via}</span>
          </span>
          <a class="gps-badge" href="${r.url}" target="_blank" rel="noopener" onclick="event.stopPropagation()">GPS ↗</a>
        </div>
      `).join('')}
    </div>
  `).join('');
}

function toggleRoutes() {
  const dd = document.getElementById('routesDropdown');
  const btn = document.getElementById('btnRoutes');
  const isOpen = dd.classList.toggle('open');
  btn.classList.toggle('open', isOpen);
}

document.addEventListener('click', e => {
  const wrapper = document.querySelector('.routes-wrapper');
  if (wrapper && !wrapper.contains(e.target)) {
    document.getElementById('routesDropdown').classList.remove('open');
    document.getElementById('btnRoutes').classList.remove('open');
  }
});

// ── STATE ─────────────────────────────────────────────────────────────────────
let stations = [];
let markers = {};
let map;
let activeZone = 'TODAS';
let selectedId = null;

function parseRaw(raw) {
  const lines = raw.trim().split('\n');
  const result = [];
  lines.forEach((line, idx) => {
    const parts = line.split('\t');
    if (parts.length >= 5) {
      const name = parts[0].trim();
      const via = parts[1].trim();
      const localidad = parts[2].trim();
      const provincia = parts[3].trim();
      const priceStr = parts[4].trim().replace(',', '.');
      const zone = parts[5] ? parts[5].trim() : 'OTRAS';
      const price = parseFloat(priceStr);
      if (isNaN(price)) return;
      const key = `${localidad}|${provincia}`;
      let coords = COORDS[key] || null;
      if (!coords) {
        const fallback = Object.keys(COORDS).find(k => k.startsWith(localidad + '|'));
        coords = fallback ? COORDS[fallback] : null;
      }
      const jitter = () => (Math.random() - 0.5) * 0.008;
      result.push({
        id: idx,
        name, via, localidad, provincia, price, zone,
        lat: coords ? coords[0] + jitter() : null,
        lng: coords ? coords[1] + jitter() : null
      });
    }
  });
  return result;
}

function priceClass(price, min, max) {
  const range = max - min;
  if (range === 0) return 'mid';
  const pct = (price - min) / range;
  if (pct < 0.33) return 'cheap';
  if (pct < 0.66) return 'mid';
  return 'exp';
}

function getMinMax() {
  const prices = stations.map(s => s.price);
  return { min: Math.min(...prices), max: Math.max(...prices) };
}

function makeMarkerIcon(cls) {
  const colors = { cheap: '#22c55e', mid: '#eab308', exp: '#ef4444' };
  const c = colors[cls] || '#f97316';
  return L.divIcon({
    className: '',
    html: `<svg width="20" height="28" viewBox="0 0 20 28" xmlns="http://www.w3.org/2000/svg">
      <path d="M10 0C4.477 0 0 4.477 0 10c0 7.18 10 18 10 18s10-10.82 10-18C20 4.477 15.523 0 10 0z" fill="${c}" opacity="0.95"/>
      <circle cx="10" cy="10" r="4" fill="white" opacity="0.9"/>
    </svg>`,
    iconSize: [20, 28],
    iconAnchor: [10, 28],
    popupAnchor: [0, -28]
  });
}

function buildZones() {
  const zones = ['TODAS', ...new Set(stations.map(s => s.zone))].sort((a, b) => a === 'TODAS' ? -1 : a.localeCompare(b));
  const container = document.getElementById('zoneFilters');
  container.innerHTML = '';
  zones.forEach(z => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (z === activeZone ? ' active' : '');
    btn.textContent = z;
    btn.onclick = () => { activeZone = z; buildZones(); renderList(); updateMarkers(); };
    container.appendChild(btn);
  });
}

function filteredStations() {
  const q = document.getElementById('searchBox').value.toLowerCase();
  return stations.filter(s => {
    const matchZone = activeZone === 'TODAS' || s.zone === activeZone;
    const matchQ = !q || s.name.toLowerCase().includes(q) || s.localidad.toLowerCase().includes(q) || s.via.toLowerCase().includes(q) || s.provincia.toLowerCase().includes(q);
    const matchRoute = !activeRoute || (ROUTE_STATION_FILTER[activeRoute] || []).includes(`${s.localidad}|${s.provincia}`);
    return matchZone && matchQ && matchRoute;
  });
}

function sortedStations(list) {
  const sort = document.getElementById('sortSelect').value;
  return [...list].sort((a, b) => {
    if (sort === 'price_asc') return a.price - b.price;
    if (sort === 'price_desc') return b.price - a.price;
    if (sort === 'name_asc') return a.name.localeCompare(b.name);
    if (sort === 'zone_asc') return a.zone.localeCompare(b.zone) || a.price - b.price;
    return 0;
  });
}

function renderList() {
  const { min, max } = getMinMax();
  const list = sortedStations(filteredStations());
  const container = document.getElementById('stationList');
  container.innerHTML = '';
  document.getElementById('totalBadge').textContent = `${list.length} estaciones`;

  if (list.length) {
    const prices = list.map(s => s.price);
    const avg = (prices.reduce((a,b) => a+b,0) / prices.length).toFixed(3).replace('.',',');
    const lo = Math.min(...prices).toFixed(3).replace('.',',');
    const hi = Math.max(...prices).toFixed(3).replace('.',',');
    document.getElementById('statsRow').innerHTML = `
      <div class="stat-chip"><div class="sv green">${lo}</div><div class="sl">Mínimo €/l</div></div>
      <div class="stat-chip"><div class="sv yellow">${avg}</div><div class="sl">Media €/l</div></div>
      <div class="stat-chip"><div class="sv red">${hi}</div><div class="sl">Máximo €/l</div></div>
    `;
  }

  if (!list.length) {
    container.innerHTML = '<div class="no-results">Sin resultados</div>';
    return;
  }

  let lastZone = null;
  const sort = document.getElementById('sortSelect').value;

  list.forEach(s => {
    if (sort === 'zone_asc' && s.zone !== lastZone) {
      const h = document.createElement('div');
      h.className = 'zone-header';
      h.textContent = s.zone;
      container.appendChild(h);
      lastZone = s.zone;
    }
    const cls = priceClass(s.price, min, max);
    const card = document.createElement('div');
    card.className = 'station-card' + (s.id === selectedId ? ' selected' : '');
    card.dataset.id = s.id;
    card.innerHTML = `
      <div class="station-info">
        <div class="station-name">${s.name}</div>
        <div class="station-meta">${s.via} · ${s.localidad}, ${s.provincia}</div>
        <div class="station-zone">${s.zone}</div>
      </div>
      <div class="price-badge ${cls}">${s.price.toFixed(3).replace('.',',')} €</div>
    `;
    card.onclick = () => selectStation(s.id);
    container.appendChild(card);
  });
}

function selectStation(id) {
  selectedId = id;
  const s = stations.find(x => x.id === id);
  if (!s) return;
  renderList();
  if (s.lat && map) {
    map.setView([s.lat, s.lng], 12, { animate: true });
    if (markers[id]) markers[id].openPopup();
  }
}

function updateMarkers() {
  const { min, max } = getMinMax();
  const visible = new Set(filteredStations().map(s => s.id));
  stations.forEach(s => {
    if (!s.lat || !markers[s.id]) return;
    if (visible.has(s.id)) {
      markers[s.id].setIcon(makeMarkerIcon(priceClass(s.price, min, max)));
      if (!map.hasLayer(markers[s.id])) markers[s.id].addTo(map);
    } else {
      if (map.hasLayer(markers[s.id])) map.removeLayer(markers[s.id]);
    }
  });
}

function rebuildMarkers() {
  const { min, max } = getMinMax();
  Object.values(markers).forEach(m => map.removeLayer(m));
  markers = {};
  stations.forEach(s => {
    if (!s.lat) return;
    const cls = priceClass(s.price, min, max);
    const m = L.marker([s.lat, s.lng], { icon: makeMarkerIcon(cls) });
    m.bindPopup(`
      <div class="popup-inner">
        <div class="popup-name">${s.name}</div>
        <div class="popup-price" style="color:${cls==='cheap'?'#22c55e':cls==='mid'?'#eab308':'#ef4444'}">${s.price.toFixed(3).replace('.',',')} €/l</div>
        <div class="popup-row"><b>Vía:</b> ${s.via}</div>
        <div class="popup-row"><b>Localidad:</b> ${s.localidad}, ${s.provincia}</div>
        <div class="popup-row"><b>Zona:</b> ${s.zone}</div>
        <a href="https://www.google.com/maps/search/?api=1&query=${s.lat},${s.lng}" target="_blank" rel="noopener" style="display:block;margin-top:8px;background:#1a73e8;color:#fff;text-align:center;padding:5px 8px;border-radius:4px;font-size:12px;font-weight:600;text-decoration:none;">&#128205; Ver en Google Maps</a>
      </div>
    `, { maxWidth: 240 });
    m.on('click', () => {
      selectedId = s.id;
      renderList();
      setTimeout(() => {
        const card = document.querySelector(`[data-id="${s.id}"]`);
        if (card) card.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }, 100);
    });
    markers[s.id] = m;
    m.addTo(map);
  });
}

function updateLastUpdate() {
  const now = new Date();
  document.getElementById('lastUpdate').textContent = 'Act: ' + now.toLocaleDateString('es-ES') + ' ' + now.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
}

// ── MODAL ─────────────────────────────────────────────────────────────────────
function openModal() {
  document.getElementById('modalOverlay').classList.add('open');
  document.getElementById('pasteArea').value = '';
  document.getElementById('parseResult').className = 'parse-result';
}
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

function parseAndUpdate() {
  const text = document.getElementById('pasteArea').value.trim();
  if (!text) { showResult('err', 'Campo vacío.'); return; }
  const newStations = parseFromPaste(text);
  if (!newStations.length) { showResult('err', 'No se detectaron filas válidas.'); return; }
  let updated = 0, added = 0;
  newStations.forEach(ns => {
    const existing = stations.find(s => s.name.toLowerCase() === ns.name.toLowerCase() && s.localidad.toLowerCase() === ns.localidad.toLowerCase());
    if (existing) { existing.price = ns.price; updated++; }
    else { ns.id = stations.length + Math.random(); stations.push(ns); added++; }
  });
  showResult('ok', `✓ ${updated} actualizadas, ${added} nuevas. Total: ${stations.length}`);
  activeZone = 'TODAS';
  buildZones();
  renderList();
  rebuildMarkers();
  updateLastUpdate();
  setTimeout(closeModal, 2000);
}

function parseFromPaste(text) {
  const result = [];
  text.split('\n').forEach((line, idx) => {
    const parts = line.split('\t');
    if (parts.length < 5) return;
    const name = parts[0].trim();
    const via = parts[1] ? parts[1].trim() : '';
    const localidad = parts[2] ? parts[2].trim() : '';
    const provincia = parts[3] ? parts[3].trim() : '';
    const priceStr = parts[4] ? parts[4].trim().replace(',', '.') : '';
    const zone = parts[5] ? parts[5].trim() : 'OTRAS';
    const price = parseFloat(priceStr);
    if (!name || isNaN(price) || price < 1 || price > 3) return;
    const key = `${localidad}|${provincia}`;
    let coords = COORDS[key] || null;
    if (!coords) {
      const fallback = Object.keys(COORDS).find(k => k.startsWith(localidad + '|'));
      coords = fallback ? COORDS[fallback] : null;
    }
    const jitter = () => (Math.random() - 0.5) * 0.008;
    result.push({ id: idx + Date.now(), name, via, localidad, provincia, price, zone,
      lat: coords ? coords[0] + jitter() : null,
      lng: coords ? coords[1] + jitter() : null });
  });
  return result;
}

function showResult(type, msg) {
  const el = document.getElementById('parseResult');
  el.className = 'parse-result ' + type;
  el.textContent = msg;
}

// ── INIT ─────────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  buildRoutesList();
  stations = parseRaw(RAW_DATA);
  map = L.map('map', { center: [40.4, -3.7], zoom: 6, zoomControl: true });
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap © CARTO',
    subdomains: 'abcd',
    maxZoom: 19
  }).addTo(map);
  buildZones();
  renderList();
  rebuildMarkers();
  updateLastUpdate();
  document.getElementById('searchBox').addEventListener('input', () => {
    renderList();
    updateMarkers();
  });
});
</script>
